<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Élégance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; }
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .admin-header { background: #1e2a3a; color: white; padding: 1.5rem; border-radius: 15px; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 0.7rem 1.5rem; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #e67e22; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .products-table { width: 100%; background: white; border-radius: 15px; overflow: hidden; }
        .products-table th, .products-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        .products-table th { background: #1e2a3a; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 2rem; border-radius: 20px; width: 90%; max-width: 500px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 10px; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: #1e2a3a; color: white; padding: 1rem 1.5rem; border-radius: 50px; transform: translateX(400px); transition: 0.3s; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> Administration Élégance</h1>
            <a href="index.html" target="_blank" class="btn btn-primary">Voir le site</a>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Ajouter un produit</button>
        </div>
        
        <div class="products-table">
            <table style="width: 100%;">
                <thead>
                    <tr><th>Image</th><th>Nom</th><th>Prix</th><th>Badge</th><th>Actions</th></tr>
                </thead>
                <tbody id="productsTable"></tbody>
            </table>
        </div>
    </div>
    
    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle">Ajouter un produit</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group"><label>Nom</label><input type="text" id="productName" required></div>
                <div class="form-group"><label>Prix (DA)</label><input type="number" id="productPrice" required></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="productImage" required></div>
                <div class="form-group"><label>Badge</label><select id="productBadge"><option>Nouveau</option><option>Best-seller</option><option>Promo</option><option>Tendance</option></select></div>
                <div class="form-group"><label>Note</label><input type="number" id="productRating" step="0.1" min="0" max="5" value="4.5"></div>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </form>
        </div>
    </div>
    
    <div class="toast" id="toastMsg"><i class="fas fa-check-circle"></i> <span>Message</span></div>
    
    <script type="module">
        import { supabase } from './supabase-config.js'
        
        let products = []
        
        async function loadProducts() {
            const { data } = await supabase.from('products').select('*').order('id')
            products = data || []
            renderTable()
        }
        
        function renderTable() {
            const tbody = document.getElementById('productsTable')
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.image}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 10px;"></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.price.toLocaleString()} DA</td>
                    <td><span style="background:#e67e22;color:white;padding:2px 8px;border-radius:20px;">${p.badge}</span></td>
                    <td>
                        <button class="btn" style="background:#f39c12;color:white;margin-right:5px;" onclick="editProduct(${p.id})">Modifier</button>
                        <button class="btn" style="background:#e74c3c;color:white;" onclick="deleteProduct(${p.id})">Supprimer</button>
                    </td>
                </tr>
            `).join('')
        }
        
        window.editProduct = (id) => {
            const p = products.find(p => p.id === id)
            if (p) {
                document.getElementById('productId').value = p.id
                document.getElementById('productName').value = p.name
                document.getElementById('productPrice').value = p.price
                document.getElementById('productImage').value = p.image
                document.getElementById('productBadge').value = p.badge
                document.getElementById('productRating').value = p.rating
                document.getElementById('modalTitle').textContent = 'Modifier le produit'
                document.getElementById('productModal').classList.add('active')
            }
        }
        
        window.deleteProduct = async (id) => {
            if (confirm('Supprimer ce produit ?')) {
                await supabase.from('products').delete().eq('id', id)
                showToast('Produit supprimé')
                loadProducts()
            }
        }
        
        window.openAddModal = () => {
            document.getElementById('productForm').reset()
            document.getElementById('productId').value = ''
            document.getElementById('modalTitle').textContent = 'Ajouter un produit'
            document.getElementById('productModal').classList.add('active')
        }
        
        function closeModal() {
            document.getElementById('productModal').classList.remove('active')
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toastMsg')
            toast.querySelector('span').textContent = msg
            toast.classList.add('show')
            setTimeout(() => toast.classList.remove('show'), 2000)
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const id = document.getElementById('productId').value
            const product = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                image: document.getElementById('productImage').value,
                badge: document.getElementById('productBadge').value,
                rating: parseFloat(document.getElementById('productRating').value)
            }
            
            if (id) {
                await supabase.from('products').update(product).eq('id', id)
                showToast('Produit modifié')
            } else {
                await supabase.from('products').insert(product)
                showToast('Produit ajouté')
            }
            closeModal()
            loadProducts()
        })
        
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('productModal')) closeModal()
        })
        
        loadProducts()
    </script>
</body>
</html>
